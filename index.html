<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>TrevoMind</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <meta charset="utf-8">
    <meta name="description" content="TrevoMind - agência estratégica de marketing, comunicação e assessoria de imprensa.">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon/favicon-32x32.png">
    <link href="assets/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="assets/css/style.css" rel="stylesheet" type="text/css">
    <link href="assets/css/responsive.css" rel="stylesheet" type="text/css">
    <link href="assets/css/owl.carousel.min.css" rel="stylesheet" type="text/css">
    <link href="assets/css/owl.theme.default.min.css" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="assets/css/animate.css">
    <link rel="stylesheet" href="assets/css/magnific-popup.css" type="text/css">
    <link href="trevomind.css" rel="stylesheet" type="text/css">
</head>
<body>
    <a id="button"></a>

    <header class="w-100 float-left header-con position-relative main-box wow fadeInDown" data-wow-duration="2s" data-wow-delay="0.2s">
        <div class="container">
            <nav class="navbar navbar-expand-lg navbar-light">
                <a class="navbar-brand" href="#home">
                    <div class="trevomind-template-logo">
                        <span class="trevomind-logo-mark"><img src="assets/images/logo-mini.png" alt="TrevoMind logo"></span>
                        <span id="brandName">TrevoMind</span>
                    </div>
                </a>
                <button class="navbar-toggler collapsed" type="button" data-toggle="collapse"
                    data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                    <span class="navbar-toggler-icon"></span>
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ml-auto" id="mainMenu"></ul>
                </div>
                <div class="header-contact">
                    <ul class="list-unstyled mb-0">
                        <li class="d-inline-block"><a href="#contato" class="contact-btn d-inline-block" id="headerCta">Agendar reunião</a></li>
                    </ul>
                </div>
            </nav>
        </div>
    </header>

    <section class="float-left w-100 banner-con position-relative main-box" id="home">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-7 col-md-7">
                    <div class="banner-content-con wow fadeInLeft" data-wow-duration="2s" data-wow-delay="0.2s">
                        <ul class="list-unstyled p-0" id="heroBadges"></ul>
                        <h1 id="heroTitle"></h1>
                        <p id="heroDescription"></p>
                        <a href="#contato" class="text-decoration-none primary_btn d-inline-block" id="heroPrimary"></a>
                        <a href="#servicos" class="text-decoration-none secondary_btn d-inline-block" id="heroSecondary"></a>
                    </div>
                </div>
                <div class="col-lg-5 col-md-5">
                    <div class="banner-img-con position-relative wow fadeInRight" data-wow-duration="2s" data-wow-delay="0.4s">
                        <figure><img src="assets/images/banner-robot.png" alt="TrevoMind" class="animated-robot"></figure>
                        <div class="coment-box1 d-flex align-items-center popup-bubble popup-delay-1">
                            <img src="assets/images/coment-box-icon1.png" alt="icon" class="img-fluid">
                            <p class="typing mb-0" id="heroBubbleOne"></p>
                        </div>
                        <div class="coment-box2 d-flex align-items-center popup-bubble popup-delay-2">
                            <img src="assets/images/coment-box-icon2.png" alt="icon" class="img-fluid">
                            <p class="typing mb-0" id="heroBubbleTwo"></p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="down_button text-center d-inline-block">
                <a href="#client" class="scroll text-decoration-none">
                    <figure class="banner-dropdownimage mb-0 d-inline-block">
                        <img src="assets/images/banner-dropdownimage.png" class="img-fluid" alt="image">
                    </figure>
                </a>
            </div>
        </div>
    </section>

    <div class="float-left w-100 client-logo-con position-relative main-box" id="client">
        <div class="container wow fadeInUp" data-wow-duration="2s" data-wow-delay="0.2s">
            <div class="client-logo-inner d-flex align-items-center justify-content-between">
                <p class="wow fadeInLeft" data-wow-duration="2s" data-wow-delay="0.2s" id="shortPitch"></p>
                <div class="logos-con d-flex align-items-center justify-content-between wow fadeIn" data-wow-duration="2s" data-wow-delay="0.2s" id="brandingKeywords"></div>
            </div>
        </div>
    </div>

    <section class="float-left w-100 amazing-features-con position-relative padding-top padding-bottom main-box" id="quem-somos">
        <div class="container wow fadeInUp" data-wow-duration="2s" data-wow-delay="0.2s">
            <div class="heading-title-con text-center">
                <span class="special-text color-blue d-block wow fadeInLeft" data-wow-duration="2s" data-wow-delay="0.2s" id="aboutSectionTitle"></span>
                <h2 class="wow fadeInRight" data-wow-duration="2s" data-wow-delay="0.4s" id="aboutHeadline"></h2>
            </div>
            <div class="row all_row" id="aboutPillars"></div>
        </div>
    </section>

    <section class="float-left w-100 position-relative main-box how-it-works-con padding-top padding-bottom" id="processo">
        <figure><img src="assets/images/vector3.png" alt="vector" class="img-fluid position-absolute vector3 animated-plane"></figure>
        <div class="container wow fadeInUp" data-wow-duration="2s" data-wow-delay="0.2s">
            <div class="row all_row">
                <div class="col-lg-7 col-md-12 wow fadeInLeft" data-wow-duration="2s" data-wow-delay="0.4s">
                    <div class="work-img-con position-relative">
                        <figure><img src="assets/images/work-img.png" alt="image" class="img-fluid"></figure>
                        <figure><img src="assets/images/robot.png" alt="robot" class="img-fluid position-absolute robot-img animated-robot"></figure>
                    </div>
                </div>
                <div class="col-lg-5 col-md-12 wow fadeInRight" data-wow-duration="2s" data-wow-delay="0.4s">
                    <div class="work-content-con">
                        <div class="heading-title-con">
                            <span class="special-text color-blue d-block wow fadeInLeft" data-wow-duration="2s" data-wow-delay="0.5s" id="processSectionTitle"></span>
                            <h2 class="wow fadeInRight" data-wow-duration="2s" data-wow-delay="0.6s" id="processHeadline"></h2>
                        </div>
                        <ul class="list-unstyled p-0" id="processSteps"></ul>
                        <a href="#contato" class="text-decoration-none primary_btn d-inline-block" id="processCta">Agendar reunião</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="float-left w-100 position-relative why-choose-us-con padding-top padding-bottom main-box" id="diferenciais">
        <div class="container wow fadeInUp" data-wow-duration="2s" data-wow-delay="0.2s">
            <div class="heading-title-con text-center">
                <span class="special-text color-blue d-block wow fadeInLeft" data-wow-duration="2s" data-wow-delay="0.2s" id="diffSectionTitle"></span>
                <h2 class="wow fadeInRight" data-wow-duration="2s" data-wow-delay="0.4s" id="diffSubtitle"></h2>
            </div>
            <div class="choose-outer-con wow fadeInDown" data-wow-duration="2s" data-wow-delay="0.5s" id="differentialsItems"></div>
            <div class="float-left w-100 m-auto text-center">
                <a href="#contato" class="text-decoration-none primary_btn d-inline-block" id="diffCta">Agendar reunião</a>
            </div>
        </div>
    </section>

    <section class="float-left w-100 position-relative pricing-plan-con padding-top padding-bottom main-box" id="modelos">
        <div class="container wow fadeInUp" data-wow-duration="2s" data-wow-delay="0.2s">
            <div class="heading-title-con text-center">
                <span class="special-text color-blue d-block wow fadeInLeft" data-wow-duration="2s" data-wow-delay="0.4s" id="workModelsSectionTitle"></span>
                <h2 class="wow fadeInRight" data-wow-duration="2s" data-wow-delay="0.5s" id="workModelsHeadline"></h2>
            </div>
            <div class="row all_row wow fadeInDown" data-wow-duration="2s" data-wow-delay="0.5s" id="workModelsItems"></div>
        </div>
    </section>

    <section class="float-left w-100 testimonials-con position-relative padding-top main-box" id="cases">
        <div class="container-fluid">
            <div class="heading-title-con text-center">
                <span class="special-text color-blue d-block wow fadeInLeft" data-wow-duration="2s" data-wow-delay="0.2s" id="casesSectionTitle"></span>
                <h2 class="wow fadeInRight" data-wow-duration="2s" data-wow-delay="0.4s" id="casesHeadline"></h2>
            </div>
            <div class="row position-relative wow fadeIn" data-wow-duration="2s" data-wow-delay="0.4s">
                <div class="owl-carousel owl-theme" id="casesCarousel"></div>
            </div>
        </div>
    </section>

    <section class="faq-con position-relative float-left w-100 main-box padding-top padding-bottom" id="faq">
        <figure><img src="assets/images/vector1.png" alt="vector" class="img-fluid position-absolute vector1 animated-plane"></figure>
        <figure><img src="assets/images/vector2.png" alt="vector" class="img-fluid position-absolute vector2"></figure>
        <div class="container wow fadeInUp" data-wow-duration="2s" data-wow-delay="0.2s">
            <div class="row">
                <div class="col-xl-7 col-lg-10 col-12 mx-auto">
                    <div class="faq_content text-center">
                        <span class="special-text color-blue d-block wow fadeInLeft" data-wow-duration="2s" data-wow-delay="0.2s">Faq's</span>
                        <h2 class="wow fadeInRight" data-wow-duration="2s" data-wow-delay="0.4s" id="faqHeadline"></h2>
                    </div>
                </div>
            </div>
            <div class="faq wow fadeInDown" data-wow-duration="2s" data-wow-delay="0.2s">
                <div class="accordian-section-inner position-relative">
                    <div class="accordian-inner">
                        <div id="faq_accordion1">
                            <div class="row">
                                <div class="col-xl-8 col-lg-10 col-md-12 col-sm-12 col-12 mx-auto" id="faqItems"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="float-left w-100 position-relative call-to-action-con main-box padding-bottom" id="contato">
        <div class="container wow fadeInUp" data-wow-duration="2s" data-wow-delay="0.2s">
            <div class="cta-inner-con padding-top100 padding-bottom100 position-relative">
                <figure><img src="assets/images/robot1.png" alt="vector" class="img-fluid position-absolute robot1 animated-robot"></figure>
                <figure><img src="assets/images/robot2.png" alt="vector" class="img-fluid position-absolute robot2 animated-robot"></figure>
                <div class="heading-title-con text-center mb-0">
                    <span class="special-text color-blue d-block wow fadeInLeft" data-wow-duration="2s" data-wow-delay="0.2s">Contato</span>
                    <h2 class="wow fadeInRight" data-wow-duration="2s" data-wow-delay="0.4s" id="ctaHeadline"></h2>
                    <p class="wow fadeInDown" data-wow-duration="2s" data-wow-delay="0.5s" id="ctaDescription"></p>
                    <a href="#" class="text-decoration-none primary_btn d-inline-block wow fadeInLeft" data-wow-duration="2s" data-wow-delay="0.6s" id="ctaButton"></a>
                    <a href="#" class="text-decoration-none secondary_btn d-inline-block wow fadeInRight" data-wow-duration="2s" data-wow-delay="0.7s" id="contactButton"></a>
                </div>
            </div>
        </div>
    </section>

    <section class="footer-con position-relative float-left w-100 main-box">
        <div class="container">
            <div class="middle_portion">
                <div class="row">
                    <div class="col-xl-3 col-lg-3 col-md-12 col-sm-12 col-12">
                        <div class="logo-content">
                            <a href="#home">
                                <div class="trevomind-template-logo footer-logo-template">
                                    <span class="trevomind-logo-mark"><img src="assets/images/logo-mini.png" alt="TrevoMind logo"></span>
                                    <span id="footerBrandName">TrevoMind</span>
                                </div>
                            </a>
                            <p class="text-size-16 text" id="footerAbout"></p>
                        </div>
                    </div>
                    <div class="col-xl-2 col-lg-2 col-md-3 col-sm-6 col-5">
                        <div class="links">
                            <h4 class="heading">Navigation</h4>
                            <ul class="list-unstyled mb-0" id="footerMenu"></ul>
                        </div>
                    </div>
                    <div class="col-xl-3 col-lg-3 col-md-4 col-sm-6 col-7">
                        <div class="icon">
                            <h4 class="heading">Contact Info</h4>
                            <ul class="list-unstyled mb-0" id="footerContacts"></ul>
                        </div>
                    </div>
                    <div class="col-xl-4 col-lg-4 col-md-5 col-sm-12 col-12">
                        <div class="email-form">
                            <h4 class="heading">Assinatura</h4>
                            <p class="text-size-16 text mb-3" id="signaturePhrase"></p>
                            <p class="text-size-16 text mb-0" id="footerClosing"></p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="copyright">
                <p class="mb-0" id="copyrightLine"></p>
            </div>
        </div>
    </section>

    <div class="loader-mask">
        <div class="loader">
            <div></div>
            <div></div>
        </div>
    </div>

    <script src="assets/js/jquery-3.7.1.min.js"></script>
    <script src="assets/js/popper.min.js"></script>
    <script src="assets/js/bootstrap.min.js"></script>
    <script src="assets/js/owl.carousel.js"></script>
    <script src="assets/js/carousel.js"></script>
    <script src="assets/js/wow.js"></script>
    <script src="assets/js/back-to-top-button.js"></script>
    <script src="assets/js/preloader.js"></script>
    <script src="assets/js/counter.js"></script>
    <script src="app.js"></script>
</body>
</html>
